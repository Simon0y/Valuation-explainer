# Dark institutional "terminal" theme for the Valuation Explainer.
# (Secrets live in the gitignored secrets.toml, not here.)

[theme]
base = "dark"
primaryColor = "#e8a33d"             # single amber accent — headers, active states, key numbers
backgroundColor = "#0a0e14"          # app background — near-black
secondaryBackgroundColor = "#11161f" # sidebar, inputs, tile panels
textColor = "#c9d3df"                # primary text
font = "sans serif"

[server]
runOnSave = true
