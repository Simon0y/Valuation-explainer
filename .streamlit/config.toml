# Clean institutional light theme for the Valuation Explainer.
# (Secrets live in the gitignored secrets.toml, not here.)

[theme]
base = "light"
primaryColor = "#1e3a5f"             # single navy accent — headers, active states, key numbers
backgroundColor = "#ffffff"          # app background
secondaryBackgroundColor = "#f7f8fa" # sidebar, inputs, hairline panels
textColor = "#1a1a2e"                # near-black text
font = "sans serif"

[server]
runOnSave = true
